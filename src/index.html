<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cockpit</title>
  <link rel="stylesheet" href="styles/theme.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-logo">Cockpit</div>

      <div class="nav-item active" data-view="dashboard" tabindex="0" role="button" aria-label="Dashboard">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="1" width="6" height="6" rx="1"/>
          <rect x="9" y="1" width="6" height="6" rx="1"/>
          <rect x="1" y="9" width="6" height="6" rx="1"/>
          <rect x="9" y="9" width="6" height="6" rx="1"/>
        </svg>
        Dashboard
      </div>

      <div class="nav-item" data-view="clients" tabindex="0" role="button" aria-label="Clients">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
          <circle cx="8" cy="5" r="3"/>
          <path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
        </svg>
        Clients
      </div>

      <div class="nav-item" data-view="projects" tabindex="0" role="button" aria-label="Projets">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="3" width="14" height="2" rx="1"/>
          <rect x="1" y="7" width="10" height="2" rx="1"/>
          <rect x="1" y="11" width="12" height="2" rx="1"/>
        </svg>
        Projets
      </div>

      <div class="nav-item" data-view="marketing" tabindex="0" role="button" aria-label="Marketing">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
          <path d="M2 10V6l8-4v12L2 10z"/>
          <path d="M10 5.5l3 1.5-3 1.5"/>
          <line x1="4" y1="11" x2="4" y2="15" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Marketing
      </div>

      <div class="nav-item" data-view="settings" tabindex="0" role="button" aria-label="Paramètres">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
          <circle cx="8" cy="8" r="2"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
        </svg>
        Paramètres
      </div>
    </nav>

    <main id="content"></main>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
